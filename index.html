<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulations — Economy Designer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <header id="topbar">
    <div class="logo">Simulations<span>.</span></div>

    <div class="sim-controls">
      <button class="btn" id="btn-step" title="Advance one step">⏭ Step</button>
      <button class="btn btn-primary" id="btn-run" title="Run / Pause simulation">▶ Run</button>
      <button class="btn" id="btn-reset" title="Reset to initial state">↺ Reset</button>
      <input type="range" id="sim-speed" min="0.25" max="10" step="0.25" value="2">
      <span id="speed-label">2×</span>
      <span id="step-counter">Step: 0</span>
      <span id="sim-status"></span>
    </div>

    <div class="analysis-controls">
      <button class="btn" id="btn-timeline" title="Toggle timeline chart">📈 Chart</button>
      <button class="btn" id="btn-batch" title="Run many simulations (Monte Carlo)">🎲 Batch</button>
      <button class="btn" id="btn-fit" title="Reset zoom &amp; pan (Ctrl+0)">⤢ Fit</button>
      <button class="btn" id="btn-snap" title="Toggle grid snap (align nodes to grid)" aria-pressed="false">⊞ Snap</button>
      <button class="btn" id="btn-autoselect" title="After placing a node, switch back to Select" aria-pressed="false">↩ Auto</button>
    </div>

    <div class="file-controls">
      <button class="btn" id="btn-undo" title="Undo (Ctrl+Z)" aria-label="Undo">↶</button>
      <button class="btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)" aria-label="Redo">↷</button>
      <select class="btn" id="btn-examples" title="Load a sample diagram">
        <option value="">Examples…</option>
        <option value="basic">Basic Economy</option>
        <option value="loot">Loot Farm</option>
        <option value="factory">Factory Line</option>
      </select>
      <button class="btn" id="btn-library" title="Saved diagrams library">📚 Library</button>
      <button class="btn" id="btn-new" title="New diagram">New</button>
      <button class="btn" id="btn-save" title="Save diagram as JSON">⬇ JSON</button>
      <button class="btn" id="btn-export-svg" title="Export diagram as SVG">⬇ SVG</button>
      <button class="btn" id="btn-export-png" title="Export diagram as PNG">⬇ PNG</button>
      <button class="btn" id="btn-export-csv" title="Export run history as CSV">⬇ CSV</button>
      <button class="btn" id="btn-share" title="Copy a shareable link to this diagram">🔗 Share</button>
      <button class="btn" id="btn-load" title="Load diagram from JSON">Load</button>
    </div>
  </header>

  <!-- Main area -->
  <div id="main">

    <!-- Node palette / tools -->
    <aside id="palette">
      <span class="palette-label">Tools</span>

      <button data-tool="select" title="Select & Move (S)">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 3l14 9-7 2-3 7L5 3z"/>
          </svg>
        </div>
        Select
      </button>

      <button data-tool="delete" title="Delete element (Del)">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
        </div>
        Delete
      </button>

      <div class="palette-sep"></div>
      <span class="palette-label">Connect</span>

      <button data-tool="connect-resource" title="Draw Resource Connection">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <line x1="4" y1="12" x2="20" y2="12" stroke="#ffa726" stroke-width="2"/>
            <polygon points="16,8 20,12 16,16" fill="#ffa726"/>
          </svg>
        </div>
        Resource
      </button>

      <button data-tool="connect-state" title="Draw State Connection">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <line x1="4" y1="12" x2="20" y2="12" stroke="#78909c" stroke-width="2" stroke-dasharray="4,3"/>
            <polygon points="16,8 20,12 16,16" fill="#78909c"/>
          </svg>
        </div>
        State
      </button>

      <div class="palette-sep"></div>
      <span class="palette-label">Nodes</span>

      <button data-tool="place-pool" title="Place Pool node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="13" fill="#1a3a6b" stroke="#4a9eff" stroke-width="2"/>
            <text x="16" y="20" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace">0</text>
          </svg>
        </div>
        Pool
      </button>

      <button data-tool="place-source" title="Place Source node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <polygon points="16,3 29,27 3,27" fill="#1a4a2a" stroke="#4caf50" stroke-width="2"/>
            <text x="16" y="23" text-anchor="middle" fill="#fff" font-size="8" font-family="monospace">∞</text>
          </svg>
        </div>
        Source
      </button>

      <button data-tool="place-drain" title="Place Drain node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <polygon points="16,29 3,5 29,5" fill="#4a1a1a" stroke="#ef5350" stroke-width="2"/>
            <text x="16" y="17" text-anchor="middle" fill="#fff" font-size="12" font-family="monospace">×</text>
          </svg>
        </div>
        Drain
      </button>

      <button data-tool="place-gate" title="Place Gate node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <polygon points="16,3 29,16 16,29 3,16" fill="#3a1a5a" stroke="#ba68c8" stroke-width="2"/>
          </svg>
        </div>
        Gate
      </button>

      <button data-tool="place-converter" title="Place Converter node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="10" cy="16" r="10" fill="#4a2a00" stroke="#ffa726" stroke-width="2"/>
            <circle cx="22" cy="16" r="10" fill="#4a2a00" stroke="#ffa726" stroke-width="2"/>
            <line x1="16" y1="8" x2="16" y2="24" stroke="#888" stroke-width="1.5"/>
          </svg>
        </div>
        Converter
      </button>

      <button data-tool="place-register" title="Place Register node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="3" y="9" width="26" height="14" rx="3" fill="#1a2a38" stroke="#78909c" stroke-width="2"/>
            <text x="16" y="20" text-anchor="middle" fill="#fff" font-size="9" font-family="monospace">R=1</text>
          </svg>
        </div>
        Register
      </button>

      <button data-tool="place-delay" title="Place Delay node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="13" fill="#004a4a" stroke="#26c6da" stroke-width="2"/>
            <circle cx="16" cy="16" r="9" fill="none" stroke="#26c6da" stroke-width="1" stroke-dasharray="4,3"/>
            <text x="16" y="20" text-anchor="middle" fill="#fff" font-size="8" font-family="monospace">D</text>
          </svg>
        </div>
        Delay
      </button>

      <button data-tool="place-queue" title="Place Queue node">
        <div class="tool-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="13" fill="#2a2a4a" stroke="#7c83ff" stroke-width="2"/>
            <circle cx="11" cy="22" r="1.6" fill="#7c83ff"/>
            <circle cx="16" cy="22" r="1.6" fill="#7c83ff"/>
            <circle cx="21" cy="22" r="1.6" fill="#7c83ff"/>
            <text x="16" y="15" text-anchor="middle" fill="#fff" font-size="8" font-family="monospace">Q</text>
          </svg>
        </div>
        Queue
      </button>
    </aside>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <svg id="canvas" role="application" aria-label="Diagram editing canvas" tabindex="0"></svg>
    </div>

    <!-- Properties panel -->
    <aside id="props-panel">
      <div id="props-header">Properties</div>
      <div id="props-content">
        <p class="props-empty">Select a node or connection to edit its properties.</p>
      </div>
    </aside>

  </div>

  <!-- Timeline chart (toggle) -->
  <div id="timeline" class="hidden">
    <div class="timeline-head">
      <span>Timeline — node values over time</span>
      <button class="btn" id="tl-close" title="Hide timeline">✕</button>
    </div>
    <canvas id="timeline-canvas"></canvas>
  </div>
</div>

<!-- Library modal -->
<div id="lib-overlay" class="hidden">
  <div id="lib-modal">
    <div class="mc-head">
      <span>📚 Diagram Library</span>
      <button class="btn" id="lib-close">✕</button>
    </div>
    <div class="mc-controls">
      <label style="flex:1">Name <input type="text" id="lib-name" placeholder="My diagram"></label>
      <button class="btn btn-primary" id="lib-save">Save current</button>
    </div>
    <div id="lib-list"></div>
  </div>
</div>

<!-- Monte Carlo modal -->
<div id="mc-overlay" class="hidden">
  <div id="mc-modal">
    <div class="mc-head">
      <span>🎲 Monte Carlo — batch runs</span>
      <button class="btn" id="mc-close">✕</button>
    </div>
    <div class="mc-controls">
      <label>Runs <input type="number" id="mc-runs" value="100" min="1" max="5000"></label>
      <label>Steps <input type="number" id="mc-steps" value="200" min="1" max="5000"></label>
      <button class="btn btn-primary" id="mc-run">Run</button>
    </div>
    <div id="mc-results"></div>
  </div>
</div>

<script src="js/model.js"></script>
<script src="js/engine.js"></script>
<script src="js/renderer.js"></script>
<script src="js/editor.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
